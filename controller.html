<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Countdown to April 4, 2026 9:00 PM ET</title>
  <style>
    :root {
      --bg: #ffffff;
      --text: #111111;
      --muted: #666666;
      --card: #f5f5f5;
      --border: #e5e5e5;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Arial, sans-serif;
      background: var(--bg);
      color: var(--text);
    }

    .wrap {
      width: 100%;
      max-width: 500px;
    }

    .card {
      border: 1px solid var(--border);
      border-radius: 18px;
      padding: 24px;
      background: #fff;
    }

    h1 {
      margin: 0 0 8px 0;
      font-size: 1.5rem;
      line-height: 1.15;
    }

    p {
      margin: 0 0 20px 0;
      color: var(--muted);
      line-height: 1.4;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(4, 1fr);
      gap: 10px;
      margin-bottom: 18px;
    }

    .box {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 14px;
      padding: 14px 10px;
      text-align: center;
    }

    .num {
      font-size: 1.6rem;
      font-weight: 700;
      line-height: 1;
      margin-bottom: 6px;
    }

    .label {
      font-size: 0.78rem;
      color: var(--muted);
      text-transform: uppercase;
      letter-spacing: 0.05em;
    }

    .status {
      font-size: 0.95rem;
      font-weight: 500;
    }

    @media (max-width: 480px) {
      .grid {
        grid-template-columns: repeat(2, 1fr);
      }

      .num {
        font-size: 1.4rem;
      }

      h1 {
        font-size: 1.3rem;
      }
    }
  </style>
</head>
<body>
  <div class="wrap">
    <div class="card">
      <h1>Countdown to April 4, 2026 — 9:00 PM ET</h1>
      <p id="targetText">Target: April 4, 2026 at 9:00 PM America/New_York</p>

      <div class="grid">
        <div class="box">
          <div class="num" id="days">0</div>
          <div class="label">Days</div>
        </div>
        <div class="box">
          <div class="num" id="hours">0</div>
          <div class="label">Hours</div>
        </div>
        <div class="box">
          <div class="num" id="minutes">0</div>
          <div class="label">Minutes</div>
        </div>
        <div class="box">
          <div class="num" id="seconds">0</div>
          <div class="label">Seconds</div>
        </div>
      </div>

      <div class="status" id="status">Loading countdown...</div>
    </div>
  </div>

  <script>
    // Target is April 4, 2026 at 9:00 PM in New York time.
    // Using explicit offset for that date in New York (EDT = UTC-4).
    const targetDate = new Date("2026-04-04T21:00:00-04:00");

    const daysEl = document.getElementById("days");
    const hoursEl = document.getElementById("hours");
    const minutesEl = document.getElementById("minutes");
    const secondsEl = document.getElementById("seconds");
    const statusEl = document.getElementById("status");

    function updateCountdown() {
      const now = new Date();
      const diff = targetDate.getTime() - now.getTime();

      if (diff <= 0) {
        daysEl.textContent = "0";
        hoursEl.textContent = "0";
        minutesEl.textContent = "0";
        secondsEl.textContent = "0";
        statusEl.textContent = "Time reached.";
        return;
      }

      const totalSeconds = Math.floor(diff / 1000);
      const days = Math.floor(totalSeconds / 86400);
      const hours = Math.floor((totalSeconds % 86400) / 3600);
      const minutes = Math.floor((totalSeconds % 3600) / 60);
      const seconds = totalSeconds % 60;

      daysEl.textContent = String(days);
      hoursEl.textContent = String(hours).padStart(2, "0");
      minutesEl.textContent = String(minutes).padStart(2, "0");
      secondsEl.textContent = String(seconds).padStart(2, "0");

      statusEl.textContent = "Counting down...";
    }

    updateCountdown();
    setInterval(updateCountdown, 1000);
  </script>
</body>
</html>
